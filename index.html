<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecos de Bosque - Frases</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --verde-negro: #0a1410;
            --verde-bosque: #162921;
            --musgo-luz: #a3c1ad;
            --crema-seda: #f0f7f4;
        }

        body {
            background-color: var(--verde-negro);
            background-image: radial-gradient(circle at center, var(--verde-bosque) 0%, var(--verde-negro) 100%);
            color: var(--crema-seda);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Lora', serif;
            overflow: hidden;
        }

        /* Área de Captura */
        #canvas-area {
            padding: 60px 40px;
            max-width: 800px;
            text-align: center;
            transition: opacity 0.6s ease, transform 0.6s ease;
            background: transparent;
        }

        .phrase {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            color: var(--musgo-luz);
            margin: 0;
            line-height: 1.4;
            font-style: italic;
            text-wrap: balance;
        }

        .author {
            font-size: 1rem;
            margin-top: 30px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--musgo-luz);
            opacity: 0.8;
        }

        .divider {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--musgo-luz), transparent);
            margin: 40px auto;
            width: 40%;
        }

        /* Botones */
        .ui-controls {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: rgba(163, 193, 173, 0.05);
            border: 1px solid var(--musgo-luz);
            color: var(--musgo-luz);
            padding: 12px 24px;
            cursor: pointer;
            font-family: 'Lora', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            transition: all 0.4s ease;
        }

        button:hover {
            background: var(--musgo-luz);
            color: var(--verde-negro);
            box-shadow: 0 0 20px rgba(163, 193, 173, 0.2);
        }

        .ai-magic {
            border-style: double;
            border-width: 3px;
        }

        /* Modo Descarga (Blanco y Negro) */
        .export-style {
            background: white !important;
            color: black !important;
        }
        .export-style .phrase, .export-style .author { color: black !important; opacity: 1; }
        .export-style .divider { background: black !important; }

        .fade-out { opacity: 0; transform: translateY(10px); }
    </style>
</head>
<body>

    <div id="canvas-area">
        <p class="phrase" id="display-p">...</p>
        <hr class="divider">
        <p class="author" id="display-a"></p>
    </div>

    <div class="ui-controls">
        <button onclick="showNext()">Siguiente Susurro</button>
        <button class="ai-magic" onclick="generateAI()">Inspiración IA</button>
        <button onclick="saveImage()">Descargar JPG</button>
    </div>

    <script>
        const library = [
            { p: "Ellos eran dos piezas que encajaban a la perfección, pero no eran del mismo rompecabezas.", a: "Mario Benedetti" },
            { p: "Si te caes, te levanto y, si no puedo, me tumbo a tu lado.", a: "Julio Cortázar" },
            { p: "Siempre estoy en mi mundo porque no quiero estar en este.", a: "David Sant" },
            { p: "Podría decirte tantas cosas... Pero si te fijas en la forma en la que te miro, ya deberías saberlo todo.", a: "Anónimo" },
            { p: "Ven a dormir conmigo: no haremos el amor, él nos hará.", a: "Julio Cortázar" },
            { p: "Escribir es como mostrar una herida que todavía no ha cerrado.", a: "Alejandra Pizarnik" },
            { p: "Amo como ama el amor. No conozco otra razón para amar que amarte.", a: "Fernando Pessoa" },
            { p: "Hay besos que en los labios dejan huellas de un campo soleado y de un amor herido.", a: "Gabriela Mistral" },
            { p: "Te quiero como para leerte cada noche, como mi libro favorito.", a: "Mario Benedetti" },
            { p: "Qué va a ser de ti lejos de casa, nena, qué va a ser de ti.", a: "Joaquín Sabina" },
            { p: "Aprendí que el coraje no era la ausencia de miedo, sino el triunfo sobre él.", a: "Nelson Mandela" },
            { p: "Me estás enseñando a amar, yo no sabía. Amar es no pedir, es dar.", a: "Gerardo Diego" },
            { p: "Si me olvidas, búscame en el viento, que allí estaré susurrando tu nombre.", a: "Pablo Neruda" },
            { p: "La memoria del corazón elimina los malos recuerdos y magnifica los buenos.", a: "Gabriel García Márquez" },
            { p: "No hay nada más poético que una persona que sabe que se va a romper y aun así sonríe.", a: "Elvira Sastre" },
            { p: "Fuimos eso que no se cuenta, ni se admite, pero que nunca se olvida.", a: "Anónimo" }
        ];

        // Lógica de IA (Fragmentos poéticos)
        const s = ["Tu recuerdo", "La soledad", "El olvido", "Tu boca", "El invierno", "Ese silencio"];
        const v = ["es un incendio que", "es el único mapa que", "es un verso que", "es la lluvia que", "es el puente que"];
        const f = ["muere en mis manos.", "no sabe hacia dónde ir.", "acaricia mi herida.", "nunca deja de doler.", "nos une en la distancia."];

        let deck = [];

        function shuffleDeck() {
            deck = [...library].sort(() => Math.random() - 0.5);
        }

        function showNext() {
            if (deck.length === 0) shuffleDeck();
            const item = deck.pop();
            render(item.p, item.a);
        }

        function generateAI() {
            const res = `${s[Math.floor(Math.random()*s.length)]} ${v[Math.floor(Math.random()*v.length)]} ${f[Math.floor(Math.random()*f.length)]}`;
            render(res, "IA Generativa");
        }

        function render(p, a) {
            const area = document.getElementById('canvas-area');
            area.classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('display-p').innerText = p;
                document.getElementById('display-a').innerText = a;
                area.classList.remove('fade-out');
            }, 500);
        }

        function saveImage() {
            const area = document.getElementById('canvas-area');
            area.classList.add('export-style');

            html2canvas(area, { backgroundColor: "#ffffff", scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Frase-${Date.now()}.jpg`;
                link.href = canvas.toDataURL("image/jpeg");
                link.click();
                area.classList.remove('export-style');
            });
        }

        window.onload = showNext;
    </script>
</body>
</html>
